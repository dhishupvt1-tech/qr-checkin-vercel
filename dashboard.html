<!DOCTYPE html>
<html>
<head>
  <title>TANTRA 2026 | Command Dashboard</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="authGuard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(135deg,#0B1C2D,#081522);font-family:'Poppins',sans-serif;color:white}
    .page{min-height:100vh;display:flex;flex-direction:column}
    .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:#11263F}
    .navbar a{color:#C9A44C;text-decoration:none;margin-left:20px}
    .content{flex:1;padding:30px;max-width:1500px;margin:auto;width:100%}

    h2{font-family:'Playfair Display',serif;color:#C9A44C;margin-bottom:10px}
    .countdown{color:#FFC107;margin-bottom:20px}

    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
    .card{padding:20px;border-radius:14px;background:#11263F}
    .num{font-size:30px;font-weight:600}

    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:25px}
    @media(max-width:900px){.grid-2{grid-template-columns:1fr}}

    .ring-box{
      background:#11263F;
      border-radius:14px;
      padding:20px;
      text-align:center;
    }

    .big-ring{
      font-size:60px;
      font-weight:bold;
      color:#4CAF50;
      margin-top:10px;
    }

    .chart-box{
      background:#11263F;
      padding:20px;
      border-radius:14px;
      display:flex;
      justify-content:center;
      align-items:center;
      height:320px;
    }

    .chart-box canvas{
      max-width:280px !important;
      max-height:280px !important;
    }

    .capacity-bar{
      height:12px;
      background:#1e3b5f;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }

    .capacity-fill{
      height:100%;
      background:#4CAF50;
      width:0%;
    }

    .status-box{
      padding:20px;
      border-radius:14px;
      text-align:center;
      font-weight:bold;
      font-size:18px;
    }

    .status-green{background:#1b5e20}
    .status-yellow{background:#f9a825;color:black}
    .status-red{background:#b71c1c}

    .recent{
      background:#11263F;
      padding:20px;
      border-radius:14px;
      margin-top:25px;
    }

    .recent-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
      margin-top:15px;
    }

    .recent-card{
      background:#1a3559;
      padding:15px;
      border-radius:10px;
    }

  </style>
</head>

<body>
<div class="page">

<nav class="navbar">
  <div style="font-family:'Playfair Display',serif;color:#C9A44C">TANTRA 2026</div>
  <div>
    <a href="register.html">Register</a>
    <a href="scan.html">Scan</a>
    <a href="admin.html">Admin</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="content">

<h2>Event Command Center</h2>
<div class="countdown" id="countdown"></div>

<div class="cards">
  <div class="card"><div>Total</div><div class="num" id="total">0</div></div>
  <div class="card"><div>Checked In</div><div class="num" id="checked">0</div></div>
  <div class="card"><div>Pending</div><div class="num" id="pending">0</div></div>
  <div class="card"><div>Rejected</div><div class="num" id="rejected">0</div></div>
</div>

<div class="grid-2">

  <div class="ring-box">
    <div>Checked-In Percentage</div>
    <div class="big-ring" id="percentRing">0%</div>

    <div style="margin-top:20px">Capacity Filled</div>
    <div class="capacity-bar">
      <div class="capacity-fill" id="capacityFill"></div>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="statusChart"></canvas>
  </div>

</div>

<div class="grid-2" style="margin-top:20px;">
  <div class="card">
    <div>Entry Rate</div>
    <div class="num" id="entryRate">0 / min</div>
  </div>

  <div id="gateStatus" class="status-box status-green">
    Gate Status: Smooth
  </div>
</div>

<div class="recent">
  <h3 style="color:#C9A44C">Last Check-Ins</h3>
  <div class="recent-grid" id="recentList"></div>
</div>

</div>
</div>

<script>
const EVENT_CAPACITY = 3000;

const supabaseClient=supabase.createClient(
"https://qwumwbmystwwhsjpllqn.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3dW13Ym15c3R3d2hzanBsbHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0OTg0OTUsImV4cCI6MjA4NjA3NDQ5NX0.Pd9xovSIz0GwsZXBj1w79fe9HfsRCv1ZtWbkJ-Umh8M"
);

let chart;
let lastCheckCount=0;

(async()=>{
const user=await requireAuth(supabaseClient);
if(!user)return;
loadDashboard();
setInterval(loadDashboard,10000);
startCountdown();
})();

async function loadDashboard(){

const totalRes=await supabaseClient.from("attendees").select("*",{count:"exact",head:true});
const checkedRes=await supabaseClient.from("attendees").select("*",{count:"exact",head:true}).eq("status","CHECKED_IN");
const pendingRes=await supabaseClient.from("attendees").select("*",{count:"exact",head:true}).eq("status","PENDING");
const rejectedRes=await supabaseClient.from("attendees").select("*",{count:"exact",head:true}).eq("status","REJECTED");

const total=totalRes.count||0;
const checked=checkedRes.count||0;
const pending=pendingRes.count||0;
const rejected=rejectedRes.count||0;

document.getElementById("total").innerText=total;
document.getElementById("checked").innerText=checked;
document.getElementById("pending").innerText=pending;
document.getElementById("rejected").innerText=rejected;

// Percentage ring
const percent = total ? Math.round((checked/total)*100) : 0;
document.getElementById("percentRing").innerText = percent + "%";

// Capacity bar
const capacityPercent = Math.min((checked/EVENT_CAPACITY)*100,100);
document.getElementById("capacityFill").style.width = capacityPercent + "%";

// Entry rate
const rate = checked - lastCheckCount;
lastCheckCount = checked;
document.getElementById("entryRate").innerText = rate + " / min";

// Gate status
const gate = document.getElementById("gateStatus");
if(rate < 20){
  gate.className="status-box status-green";
  gate.innerText="Gate Status: Smooth";
}else if(rate < 50){
  gate.className="status-box status-yellow";
  gate.innerText="Gate Status: Busy";
}else{
  gate.className="status-box status-red";
  gate.innerText="Gate Status: Crowded";
}

renderChart(checked,pending,rejected);
loadRecent();
}

async function loadRecent(){
const {data}=await supabaseClient
.from("attendees")
.select("name,reg_no")
.eq("status","CHECKED_IN")
.order("created_at",{ascending:false})
.limit(5);

let html="";
data.forEach(d=>{
html+=`<div class="recent-card">
<b>${d.name}</b><br>${d.reg_no}
</div>`;
});
document.getElementById("recentList").innerHTML=html;
}

function renderChart(checked,pending,rejected){
if(chart)chart.destroy();
chart=new Chart(document.getElementById("statusChart"),{
type:"doughnut",
data:{
labels:["Checked","Pending","Rejected"],
datasets:[{
data:[checked,pending,rejected],
backgroundColor:["#4CAF50","#FFC107","#F44336"]
}]
},
options:{
responsive:true,
maintainAspectRatio:true,
aspectRatio:1,
plugins:{legend:{labels:{color:"white"}}}
}
});
}

function startCountdown(){
const eventDate=new Date("March 27, 2026 08:00:00").getTime();
setInterval(()=>{
const now=new Date().getTime();
const distance=eventDate-now;
if(distance<0){
document.getElementById("countdown").innerText="Event is Live 🎉";
return;
}
const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("countdown").innerText=
`Event Countdown: ${days}d ${hours}h ${minutes}m`;
},1000);
}

async function logout(){
await supabaseClient.auth.signOut();
window.location.href="login.html";
}
</script>

</body>
</html>
