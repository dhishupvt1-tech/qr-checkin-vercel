<!DOCTYPE html>
<html>
<head>
  <title>TANTRA 2026 | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="authGuard.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0B1C2D;font-family:Arial;color:white;min-height:100vh}
    .hidden{display:none}

    .lock-overlay{
      position:fixed;inset:0;display:flex;justify-content:center;align-items:center;
      background:linear-gradient(135deg,#0B1C2D,#081522);z-index:9999;
    }

    .lock-card{
      width:300px;padding:30px;background:rgba(255,255,255,0.06);
      backdrop-filter:blur(20px);border-radius:16px;text-align:center;
    }

    .dots{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
    .dot{width:14px;height:14px;border-radius:50%;border:2px solid #C9A44C}
    .dot.filled{background:#C9A44C}

    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .key{padding:14px;background:#11263F;border-radius:10px;cursor:pointer}
    .key:hover{background:#C9A44C;color:black}

    .navbar{display:flex;justify-content:space-between;padding:16px 25px;background:#11263F}
    .navbar a{color:#C9A44C;text-decoration:none;margin-left:15px;font-weight:bold}

    .container{padding:20px;max-width:1500px;margin:auto}
    h2{margin-bottom:15px;color:#C9A44C}

    .top-controls{display:flex;gap:10px;margin-bottom:15px}
    .top-controls input,.top-controls select{padding:10px;border-radius:6px;border:none}

    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:8px;border:1px solid #1e3b5f;text-align:center}
    th{background:#11263F;color:#C9A44C}

    .photo-thumb{width:55px;height:55px;object-fit:cover;border-radius:8px;border:2px solid #C9A44C;cursor:pointer}

    .badge{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:bold}
    .PENDING{background:#FFC107;color:black}
    .CHECKED_IN{background:#4CAF50}
    .REJECTED{background:#F44336}

    .actions{display:flex;justify-content:center;gap:4px}
    button.action{width:26px;height:26px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
    .btn-check{background:#4CAF50;color:white}
    .btn-reject{background:#F44336;color:white}
    .btn-pending{background:#FFC107;color:black}
    .btn-delete{background:#555;color:white}
    .btn-qr{background:#C9A44C;color:black}

    .pagination-container{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:15px;flex-wrap:wrap}
    .page-btn{padding:6px 10px;background:#11263F;border:1px solid #C9A44C;color:#C9A44C;cursor:pointer;border-radius:5px}
    .page-btn.active{background:#C9A44C;color:black}

    .photo-modal{
      position:fixed;inset:0;background:rgba(0,0,0,0.85);
      display:flex;justify-content:center;align-items:center;z-index:9999;display:none;
    }
    .photo-modal img{max-width:90%;max-height:90%;border-radius:14px;border:4px solid #C9A44C}
  </style>
</head>

<body>

<!-- PIN LOCK -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-card">
    <h3>Admin Access</h3>
    <div class="dots" id="dots"></div>
    <div class="keypad" id="keypad"></div>
  </div>
</div>

<div id="mainAdmin" class="hidden">
  <nav class="navbar">
    <div>TANTRA 2026</div>
    <div>
      <a href="register.html">Register</a>
      <a href="scan.html">Scan</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h2>Admin Panel</h2>

    <div class="top-controls">
      <input id="searchInput" placeholder="Search">
      <select id="sortSelect">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="name">Name</option>
        <option value="status">Status</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>Photo</th>
          <th>Name</th>
          <th>Email</th>
          <th>Reg No</th>
          <th>Entry ID</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="pagination-container" id="pagination"></div>
  </div>
</div>

<div class="photo-modal" id="photoModal" onclick="closePhoto()">
  <img id="modalImg">
</div>

<script>
const ACCESS_CODE="528494";
let enteredPin="";

const dots=document.getElementById("dots");
const keypad=document.getElementById("keypad");

for(let i=0;i<6;i++){
  const d=document.createElement("div");
  d.className="dot";
  dots.appendChild(d);
}

for(let i=1;i<=9;i++) addKey(i);
addKey("0");
addKey("←");

function addKey(val){
  const key=document.createElement("div");
  key.className="key";
  key.innerText=val;
  key.onclick=()=>pressKey(val);
  keypad.appendChild(key);
}

function pressKey(val){
  if(val==="←") enteredPin=enteredPin.slice(0,-1);
  else if(enteredPin.length<6) enteredPin+=val;
  updateDots();

  if(enteredPin.length===6){
    if(enteredPin===ACCESS_CODE){
      document.getElementById("lockOverlay").style.display="none";
      document.getElementById("mainAdmin").classList.remove("hidden");
      loadData();
    }else{
      enteredPin="";
      updateDots();
    }
  }
}

function updateDots(){
  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("filled",i<enteredPin.length);
  });
}

/* SUPABASE */
const supabaseClient = supabase.createClient(
  "https://qwumwbmystwwhsjpllqn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3dW13Ym15c3R3d2hzanBsbHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0OTg0OTUsImV4cCI6MjA4NjA3NDQ5NX0.Pd9xovSIz0GwsZXBj1w79fe9HfsRCv1ZtWbkJ-Umh8M"
);

let currentPage=1;
const rowsPerPage=50;
let totalRows=0;

async function loadData(){
  const from=(currentPage-1)*rowsPerPage;
  const to=from+rowsPerPage-1;

  const {data,count}=await supabaseClient
    .from("attendees")
    .select("*",{count:"exact"})
    .range(from,to);

  totalRows=count;
  renderTable(data);
  renderPagination();
}

function renderTable(data){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  data.forEach(a=>{
    tbody.innerHTML+=`
    <tr>
      <td>${a.id_photo_url ? `<img src="${a.id_photo_url}" class="photo-thumb" onclick="openPhoto('${a.id_photo_url}')">` : "-"}</td>
      <td>${a.name}</td>
      <td>${a.email}</td>
      <td>${a.reg_no}</td>
      <td>${a.entry_id}</td>
      <td><span class="badge ${a.status}">${a.status}</span></td>
      <td class="actions">
        <button class="action btn-check" onclick="updateStatus('${a.entry_id}','CHECKED_IN')">✔</button>
        <button class="action btn-reject" onclick="updateStatus('${a.entry_id}','REJECTED')">✖</button>
        <button class="action btn-pending" onclick="updateStatus('${a.entry_id}','PENDING')">⏳</button>
        <button class="action btn-delete" onclick="deleteUser('${a.entry_id}')">🗑</button>
        <button class="action btn-qr" onclick="viewQR('${encodeURIComponent(a.qr)}')">🔳</button>
      </td>
    </tr>`;
  });
}

function renderPagination(){
  const pageCount=Math.ceil(totalRows/rowsPerPage);
  const pagination=document.getElementById("pagination");
  pagination.innerHTML="";

  for(let i=1;i<=pageCount;i++){
    const btn=document.createElement("button");
    btn.innerText=i;
    btn.className="page-btn";
    if(i===currentPage) btn.classList.add("active");
    btn.onclick=()=>{currentPage=i;loadData();}
    pagination.appendChild(btn);
  }
}

async function updateStatus(id,status){
  await supabaseClient.from("attendees").update({status}).eq("entry_id",id);
  loadData();
}

async function deleteUser(id){
  if(!confirm("Delete?")) return;
  await supabaseClient.from("attendees").delete().eq("entry_id",id);
  loadData();
}

function viewQR(qr){
  window.open("view-qr.html?qr="+qr,"_blank");
}

function openPhoto(url){
  document.getElementById("modalImg").src=url;
  document.getElementById("photoModal").style.display="flex";
}

function closePhoto(){
  document.getElementById("photoModal").style.display="none";
}

async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href="login.html";
}
</script>

</body>
</html>
